<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor IA - Beta 2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #e8f4fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #b3d7ff; }
        .btn-login { display: block; text-align: center; margin-bottom: 20px; padding: 10px; background: #4285f4; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 15px; }
        button { padding: 12px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-main { background: #007bff; color: white; }
        .btn-load { background: #6c757d; color: white; grid-column: 1 / -1; }
        #resultado { margin-top: 30px; padding: 20px; background: #fafafa; border-radius: 10px; border-left: 6px solid #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mentor IA Académico</h1>
        
        <a href="/login" class="btn-login">🔑 Iniciar sesión con Google</a>

        <div class="status-bar">
            <span>🛡️ Modo: Beta 2</span>
        </div>

        <textarea id="texto" placeholder="Pega aquí el material de estudio..."></textarea>
        
        <div class="controls">
            <button class="btn-load" onclick="enviar('cargar_material')">📌 Paso 1: Cargar Material</button>
            <button class="btn-main" onclick="enviar('analizar')">Analizar</button>
            <button class="btn-main" onclick="enviar('resumen')">Resumen</button>
            <button class="btn-main" onclick="enviar('explicar')">Explicar</button>
        </div>

        <div id="resultado">El análisis del Mentor aparecerá aquí...</div>
    </div>

    <script>
        // URL dinámica basada en el entorno actual
        const BASE_URL = window.location.origin;

        async function enviar(tarea) {
            const texto = document.getElementById('texto').value;
            if (!texto) return alert("Ingresa contenido.");

            const resDiv = document.getElementById('resultado');
            resDiv.innerText = "Procesando...";
            
            try {
                const res = await fetch(`${BASE_URL}/${tarea}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: texto })
                });
                
                const data = await res.json();
                
                if(res.status === 401) {
                    resDiv.innerHTML = "⚠️ Error: Debes <a href='/login'>iniciar sesión</a> primero.";
                } else if(data.error) {
                    resDiv.innerText = "⚠️ " + data.error;
                } else {
                    resDiv.innerText = data.resultado;
                }
            } catch (err) {
                resDiv.innerText = "Error de conexión con el servidor.";
            }
        }
    </script>
</body>
</html>
