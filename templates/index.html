<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mentor IA Premium Académico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .ad-btn { background: #28a745; }
        #resultado { margin-top: 20px; white-space: pre-wrap; background: #f8f9fa; padding: 15px; border-radius: 5px; border-left: 5px solid #007bff; }
        .status { font-weight: bold; color: #555; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mentor IA Premium</h1>
        <div id="status" class="status">Cargando consultas...</div>
        
        <textarea id="texto" placeholder="Pega tu material, duda o respuesta aquí..."></textarea>
        
        <div class="controls">
            <button onclick="enviar('analizar')">Analizar</button>
            <button onclick="enviar('resumen')">Resumen</button>
            <button onclick="enviar('explicar')">Explicar Concepto</button>
            <button onclick="enviar('rap')">Rap Académico</button>
            <button onclick="enviar('mapa_conceptual')">Mapa Conceptual</button>
            <button onclick="enviar('aleatorio')">Ejercicios Aleatorios</button>
        </div>
        <br>
        <button class="ad-btn" onclick="verPublicidad()">Ver publicidad (+5 consultas)</button>

        <div id="resultado">El resultado aparecerá aquí...</div>
    </div>

    <script>
        // Cargar estado inicial
        async function cargarEstado() {
            const res = await fetch('/estado_usuario'); // Deberías añadir esta ruta en app.py
            const data = await res.json();
            document.getElementById('status').innerText = `Consultas usadas: ${data.consultas_usadas} | Tipo: ${data.tipo_usuario}`;
        }

        async function enviar(tarea) {
            const texto = document.getElementById('texto').value;
            const res = await fetch(`/${tarea}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ texto })
            });
            const data = await res.json();
            if(data.error) alert(data.error);
            else document.getElementById('resultado').innerText = data.resultado;
            cargarEstado();
        }

        async function verPublicidad() {
            const res = await fetch('/confirmar_publicidad', { method: 'POST' });
            if(res.ok) {
                alert("¡Publicidad confirmada! Tienes 5 consultas extra.");
                cargarEstado();
            }
        }

        cargarEstado();
    </script>
</body>
</html>
